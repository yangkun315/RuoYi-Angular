<div class="notifications-panel">
  <h2 class="notifications-panel__title">Notifications</h2>
  <nz-divider class="notifications-panel__divider" />

  <nz-list class="notifications-list" [nzSplit]="false">
    @for (item of items; track item.id) {
      <nz-list-item class="notifications-list__item">
        <nz-list-item-meta>
          <nz-list-item-meta-avatar>
            <nz-avatar nzSize="large" [nzSrc]="item.avatarUrl" nzAlt="" />
          </nz-list-item-meta-avatar>
          <nz-list-item-meta-title>
            <span class="notifications-list__name">{{ item.name }}</span>
          </nz-list-item-meta-title>
          <nz-list-item-meta-description>
            <span class="notifications-list__desc">{{ item.description }}</span>
          </nz-list-item-meta-description>
        </nz-list-item-meta>
      </nz-list-item>
    }
  </nz-list>

  <nz-divider class="notifications-panel__divider" />
  <div class="notifications-panel__footer">
    <button nz-button nzType="link" class="notifications-panel__see-all">See All</button>
  </div>
</div>
