<div class="login-container">
  <div class="login-box">
    <h1 class="title">若依管理系统</h1>
    <form nz-form [formGroup]="form" (ngSubmit)="submit()" nzLayout="vertical">
      <nz-form-item>
        <nz-form-control nzErrorTip="请输入用户名">
          <input nz-input formControlName="username" placeholder="用户名" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control nzErrorTip="请输入密码">
          <input nz-input type="password" formControlName="password" placeholder="密码" />
        </nz-form-control>
      </nz-form-item>
      @if (captchaEnabled()) {
        <nz-form-item>
          <nz-form-control nzErrorTip="请输入验证码">
            <div class="captcha-row">
              <input nz-input formControlName="code" placeholder="验证码" />
              <img
                class="captcha-img"
                [src]="captchaImg() ? 'data:image/gif;base64,' + captchaImg() : ''"
                (click)="getCode()"
                alt="验证码"
                style="cursor: pointer"
              />
            </div>
          </nz-form-control>
        </nz-form-item>
      }
      <nz-form-item>
        <nz-form-control>
          <label nz-checkbox formControlName="rememberMe">记住密码</label>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <button nz-button nzType="primary" nzBlock [nzLoading]="loading()" type="submit">
          登 录
        </button>
      </nz-form-item>
    </form>
  </div>
</div>
