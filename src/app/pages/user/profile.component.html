<div class="profile-page">
  <h1 class="profile-page__title">个人中心</h1>
  <nz-row [nzGutter]="16">
    <nz-col [nzXs]="24" [nzMd]="8" [nzLg]="7">
      <nz-card nzTitle="个人信息" class="profile-card">
        <button type="button" class="profile-card__avatar profile-card__avatar--btn" (click)="openAvatarModal()" aria-label="修改头像">
          <span class="profile-card__avatar-wrap">
            <nz-avatar [nzSrc]="avatarUrl()" [nzSize]="96" nzIcon="user" />
            <span class="profile-card__avatar-plus" aria-hidden="true">
              <span nz-icon nzType="plus"></span>
            </span>
          </span>
        </button>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="user"></span>
          <span class="profile-info-row__label">用户名称</span>
          <span class="profile-info-row__value">{{ displayUser()?.userName || '—' }}</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="mobile"></span>
          <span class="profile-info-row__label">手机号码</span>
          <span class="profile-info-row__value">{{ displayUser()?.phonenumber || '—' }}</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="mail"></span>
          <span class="profile-info-row__label">用户邮箱</span>
          <span class="profile-info-row__value">{{ displayUser()?.email || '—' }}</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="team"></span>
          <span class="profile-info-row__label">所属部门</span>
          <span class="profile-info-row__value">{{ deptDisplay() }}</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="safety"></span>
          <span class="profile-info-row__label">所属角色</span>
          <span class="profile-info-row__value">{{ roleGroup() || '—' }}</span>
        </div>
        <div class="profile-info-row">
          <span class="profile-info-row__icon" nz-icon nzType="file-text"></span>
          <span class="profile-info-row__label">创建日期</span>
          <span class="profile-info-row__value">{{ displayUser()?.createTime || '—' }}</span>
        </div>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="24" [nzMd]="16" [nzLg]="17">
      <nz-card class="profile-main-card">
        <nz-tabs>
          <nz-tab nzTitle="基本资料">
            <form nz-form nzLayout="horizontal" class="mt-md">
              <nz-form-item>
                <nz-form-label nzRequired [nzSm]="6" [nzXs]="24">用户昵称</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input name="nickName" [(ngModel)]="form.nickName" maxlength="30" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                <nz-form-label nzRequired [nzSm]="6" [nzXs]="24">手机号码</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input name="phonenumber" [(ngModel)]="form.phonenumber" maxlength="11" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                <nz-form-label nzRequired [nzSm]="6" [nzXs]="24">邮箱</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input name="email" type="email" [(ngModel)]="form.email" maxlength="50" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24">性别</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <nz-radio-group name="sex" [(ngModel)]="form.sex">
                    <label nz-radio nzValue="0">男</label>
                    <label nz-radio nzValue="1">女</label>
                  </nz-radio-group>
                </nz-form-control>
              </nz-form-item>
              <nz-form-item class="profile-form-actions">
                <nz-form-control [nzSm]="14" [nzXs]="24" [nzOffset]="6">
                  <button nz-button nzType="primary" [nzLoading]="savingProfile" type="button" (click)="saveProfile()">保存</button>
                  <button nz-button nzDanger type="button" (click)="closePage()">关闭</button>
                </nz-form-control>
              </nz-form-item>
            </form>
          </nz-tab>
          <nz-tab nzTitle="修改密码">
            <form nz-form nzLayout="horizontal" class="mt-md">
              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24">旧密码</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input type="password" name="oldPwd" [(ngModel)]="pwd.oldPassword" autocomplete="current-password" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24">新密码</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input type="password" name="newPwd" [(ngModel)]="pwd.newPassword" autocomplete="new-password" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24">确认密码</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24">
                  <input nz-input type="password" name="confirmPwd" [(ngModel)]="pwd.confirmPassword" autocomplete="new-password" />
                </nz-form-control>
              </nz-form-item>
              <nz-form-item class="profile-form-actions">
                <nz-form-control [nzSm]="14" [nzXs]="24" [nzOffset]="6">
                  <button nz-button nzType="primary" [nzLoading]="savingPwd" type="button" (click)="savePassword()">保存</button>
                  <button nz-button nzDanger type="button" (click)="closePage()">关闭</button>
                </nz-form-control>
              </nz-form-item>
            </form>
          </nz-tab>
        </nz-tabs>
      </nz-card>
    </nz-col>
  </nz-row>
</div>

<nz-modal
  [(nzVisible)]="avatarModalVisible"
  nzTitle="修改头像"
  nzWrapClassName="profile-avatar-modal"
  [nzWidth]="760"
  [nzBodyStyle]="{ padding: '12px 16px 8px' }"
  (nzOnCancel)="closeAvatarModal()"
  [nzFooter]="avatarModalFooter"
>
  <ng-container *nzModalContent>
    <input
      #avatarFileInput
      type="file"
      accept="image/jpeg,image/png,image/gif,image/webp"
      hidden
      (change)="onAvatarFileChange($event)"
    />
    <nz-row [nzGutter]="[12, 8]" class="profile-avatar-modal-row">
      <nz-col [nzXs]="24" [nzSm]="15" [nzMd]="15">
        <div class="profile-avatar-crop-wrap">
          <image-cropper
            [imageChangedEvent]="imageChangedEvent"
            [maintainAspectRatio]="true"
            [aspectRatio]="1 / 1"
            format="png"
            output="blob"
            [resizeToWidth]="200"
            [cropperStaticWidth]="200"
            [cropperStaticHeight]="200"
            [transform]="cropTransformSig()"
            [containWithinAspectRatio]="true"
            [allowMoveImage]="true"
            [roundCropper]="false"
            alignImage="center"
            backgroundColor="transparent"
            (imageLoaded)="onCropperImageLoaded()"
            (imageCropped)="onImageCropped($event)"
          />
        </div>
      </nz-col>
      <nz-col [nzXs]="24" [nzSm]="9" [nzMd]="9">
        <div class="profile-avatar-preview-label">预览</div>
        <div class="profile-avatar-preview-circle">
          @if (previewUrl) {
            <img [src]="previewUrl" alt="头像预览" />
          } @else {
            <span class="profile-avatar-preview-placeholder">裁剪后预览</span>
          }
        </div>
      </nz-col>
    </nz-row>
  </ng-container>
  <ng-template #avatarModalFooter>
    <button nz-button nzType="primary" type="button" (click)="triggerAvatarFilePick()">
      选择
      <span nz-icon nzType="cloud-upload"></span>
    </button>
    <button nz-button nzType="default" type="button" class="profile-avatar-icon-btn" (click)="zoomCrop(0.15)" aria-label="放大">
      <span nz-icon nzType="plus"></span>
    </button>
    <button nz-button nzType="default" type="button" class="profile-avatar-icon-btn" (click)="zoomCrop(-0.15)" aria-label="缩小">
      <span nz-icon nzType="minus"></span>
    </button>
    <button nz-button nzType="default" type="button" class="profile-avatar-icon-btn" (click)="rotateCrop(-90)" aria-label="向左旋转">
      <span nz-icon nzType="rotate-left"></span>
    </button>
    <button nz-button nzType="default" type="button" class="profile-avatar-icon-btn" (click)="rotateCrop(90)" aria-label="向右旋转">
      <span nz-icon nzType="rotate-right"></span>
    </button>
    <span class="profile-avatar-footer-spacer"></span>
    <button nz-button nzType="primary" type="button" [nzLoading]="uploadingAvatar" (click)="submitAvatar()">提交</button>
  </ng-template>
</nz-modal>
